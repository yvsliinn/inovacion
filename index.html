<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Gestión de Camas - Simplificado</title>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>Hospital de Talca</h2>
  <p>Iniciar sesión</p>

  <input id="user" placeholder="usuario" />
  <input id="pass" type="password" placeholder="contraseña" />

  <select id="role">
    <option value="medico">Médico</option>
    <option value="enfermero">Enfermero</option>
    <option value="admin">Admin</option>
  </select>

  <button onclick="login()">Entrar</button>
  <p id="error" style="color:red"></p>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <h2>Gestión de Camas</h2>
  <button onclick="logout()">Cerrar sesión</button>

  <hr>

  <h3>Filtros</h3>
  <button onclick="setFilter('all')">Todas</button>
  <button onclick="setFilter('libre')">Libres</button>
  <button onclick="setFilter('ocupada')">Ocupadas</button>
  <button onclick="setFilter('reservada')">Reservadas</button>

  <hr>

  <h3>Camas</h3>
  <div id="beds"></div>
</div>

<script>
const USERS = {
  admin: { pass: "1234" }
};

let beds = [];
let filter = "all";

function generateBeds() {
  const statuses = ["libre","ocupada","reservada","limpieza"];
  beds = [];
  for (let i = 1; i <= 30; i++) {
    beds.push({
      id: i,
      num: "CAMA-" + i,
      status: statuses[Math.floor(Math.random()*statuses.length)],
      patient: "Paciente " + i
    });
  }
}

function render() {
  const cont = document.getElementById("beds");
  cont.innerHTML = "";

  beds
    .filter(b => filter === "all" ? true : b.status === filter)
    .forEach(b => {
      const div = document.createElement("div");
      div.innerHTML =
        "<b>" + b.num + "</b> - " +
        b.status.toUpperCase() +
        (b.status === "ocupada" ? " (" + b.patient + ")" : "");

      div.style.margin = "5px 0";
      div.style.cursor = "pointer";

      div.onclick = () => {
        if (b.status === "libre") b.status = "ocupada";
        else if (b.status === "ocupada") b.status = "libre";
        render();
      };

      cont.appendChild(div);
    });
}

function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === "admin" && p === USERS.admin.pass) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    generateBeds();
    render();
  } else {
    document.getElementById("error").innerText = "Error de login";
  }
}

function logout() {
  location.reload();
}

function setFilter(f) {
  filter = f;
  render();
}
</script>

</body>
</html>
