<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de Camas - Hospital Regional de Talca</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#edf2f7;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#0f172a;
color:white;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.logo{
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

.menu button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

.menu button:hover{
background:#334155;
}

/* MAIN */

.main{
flex:1;
padding:20px;
overflow:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.top h1{
font-size:28px;
color:#0f172a;
}

.actions{
display:flex;
gap:10px;
}

.actions button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.add{
background:#16a34a;
color:white;
}

.logout{
background:#dc2626;
color:white;
}

/* LOGIN */

#login{
position:fixed;
inset:0;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.login-box{
background:white;
padding:35px;
border-radius:20px;
width:350px;
}

.login-box h2{
margin-bottom:20px;
color:#0f172a;
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #cbd5e1;
border-radius:10px;
}

.login-box button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

/* AREAS */

.area{
margin-bottom:35px;
}

.area-title{
font-size:22px;
margin-bottom:15px;
color:#1e293b;
display:flex;
align-items:center;
gap:10px;
}

/* CAMAS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:15px;
}

.cama{
background:white;
border-radius:18px;
padding:18px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.2s;
}

.cama:hover{
transform:translateY(-4px);
}

.estado{
padding:6px 12px;
border-radius:20px;
font-size:13px;
display:inline-block;
margin-bottom:12px;
font-weight:bold;
}

.libre{
background:#dcfce7;
color:#166534;
}

.ocupada{
background:#fee2e2;
color:#991b1b;
}

.reservada{
background:#fef3c7;
color:#92400e;
}

.cama h3{
margin-bottom:10px;
color:#0f172a;
}

.cama p{
margin-bottom:6px;
color:#334155;
font-size:14px;
}

.cama input,
.cama select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #cbd5e1;
}

.btns{
display:flex;
gap:8px;
margin-top:12px;
}

.btns button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.save{
background:#2563eb;
color:white;
}

.delete{
background:#dc2626;
color:white;
}

/* CREDENCIALES */

.info{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

.info h3{
margin-bottom:10px;
color:#0f172a;
}

.info p{
margin-bottom:5px;
color:#334155;
}

</style>
</head>

<body>

<div id="login">

<div class="login-box">

<h2>Ingreso Hospital</h2>

<input type="text" id="user" placeholder="Usuario">

<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

</div>

</div>

<div class="sidebar">

<div class="logo">
<i class="ti ti-building-hospital"></i>
Hospital Talca
</div>

<div class="menu">

<button>Dashboard</button>
<button>Pacientes</button>
<button>Camas</button>
<button>Doctores</button>
<button>Urgencias</button>

</div>

</div>

<div class="main">

<div class="top">

<h1>Sistema Gestión de Camas</h1>

<div class="actions">

<button class="add" onclick="agregarCama()">
Agregar Cama
</button>

<button class="logout" onclick="cerrarSesion()">
Salir
</button>

</div>

</div>

<div class="info">

<h3>Credenciales</h3>

<p><b>Administrador:</b> admin / admin123</p>

<p><b>Doctor:</b> doctor / doctor123</p>

<p><b>Enfermera:</b> enfermera / enfer123</p>

</div>

<div id="contenedor"></div>

</div>

<script>

const areas = [
"Obstetricia",
"Pediatría",
"UTI",
"Medicina",
"Cirugía"
];

let camas = [

{
numero:"OBS-01",
estado:"ocupada",
paciente:"Camila Rojas",
doctor:"Dra. Herrera",
area:"Obstetricia"
},

{
numero:"OBS-02",
estado:"libre",
paciente:"",
doctor:"",
area:"Obstetricia"
},

{
numero:"PED-01",
estado:"ocupada",
paciente:"Tomás Silva",
doctor:"Dr. Morales",
area:"Pediatría"
},

{
numero:"UTI-01",
estado:"reservada",
paciente:"Luis Vega",
doctor:"Dr. Soto",
area:"UTI"
},

{
numero:"MED-01",
estado:"ocupada",
paciente:"Andrea Torres",
doctor:"Dra. Riquelme",
area:"Medicina"
},

{
numero:"CIR-01",
estado:"libre",
paciente:"",
doctor:"",
area:"Cirugía"
}

];

function login(){

const u = document.getElementById("user").value;
const p = document.getElementById("pass").value;

if(
(u=="admin" && p=="admin123") ||
(u=="doctor" && p=="doctor123") ||
(u=="enfermera" && p=="enfer123")
){

document.getElementById("login").style.display="none";

}else{

alert("Credenciales incorrectas");

}

}

function render(){

const cont = document.getElementById("contenedor");

cont.innerHTML="";

areas.forEach(area=>{

const div = document.createElement("div");

div.className="area";

div.innerHTML=`
<div class="area-title">
<i class="ti ti-hospital"></i>
${area}
</div>

<div class="grid">

${camas.filter(c=>c.area===area).map((cama,index)=>`

<div class="cama">

<div class="estado ${cama.estado}">
${cama.estado.toUpperCase()}
</div>

<h3>${cama.numero}</h3>

<p><b>Paciente:</b></p>

<input 
type="text"
value="${cama.paciente}"
id="paciente-${index}"
placeholder="Nombre paciente"
>

<p><b>Doctor:</b></p>

<input 
type="text"
value="${cama.doctor}"
id="doctor-${index}"
placeholder="Nombre doctor"
>

<p><b>Estado:</b></p>

<select id="estado-${index}">

<option value="libre" ${cama.estado=="libre"?"selected":""}>
Libre
</option>

<option value="ocupada" ${cama.estado=="ocupada"?"selected":""}>
Ocupada
</option>

<option value="reservada" ${cama.estado=="reservada"?"selected":""}>
Reservada
</option>

</select>

<div class="btns">

<button class="save" onclick="guardar(${index})">
Guardar
</button>

<button class="delete" onclick="eliminar(${index})">
Eliminar
</button>

</div>

</div>

`).join("")}

</div>
`;

cont.appendChild(div);

});

}

function guardar(i){

camas[i].paciente =
document.getElementById(`paciente-${i}`).value;

camas[i].doctor =
document.getElementById(`doctor-${i}`).value;

camas[i].estado =
document.getElementById(`estado-${i}`).value;

alert("Datos actualizados");

render();

}

function eliminar(i){

if(confirm("¿Eliminar cama?")){

camas.splice(i,1);

render();

}

}

function agregarCama(){

const numero = prompt("Número cama");

const area = prompt("Área (Obstetricia, Pediatría, UTI, Medicina, Cirugía)");

if(numero && area){

camas.push({

numero:numero,
estado:"libre",
paciente:"",
doctor:"",
area:area

});

render();

}

}

function cerrarSesion(){

location.reload();

}

render();

</script>

</body>
</html>
