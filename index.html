<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Camas Hospital de Talca</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#eef2f7;
}

.login{
    width:330px;
    margin:70px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.login h2{
    color:#0d4d85;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#0d4d85;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#08355c;
}

.login button{
    width:100%;
    margin-top:15px;
}

.info{
    background:#f1f5f9;
    margin-top:15px;
    padding:10px;
    border-radius:8px;
    font-size:14px;
}

.app{
    display:none;
}

.top{
    background:#0d4d85;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    padding:20px;
}

.filters button{
    margin-right:5px;
    margin-bottom:5px;
    background:#dbeafe;
    color:#0d4d85;
}

.filters button:hover{
    background:#93c5fd;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.08);
    transition:0.2s;
}

.card:hover{
    transform:scale(1.02);
}

.libre{
    border-left:8px solid #22c55e;
}

.ocupada{
    border-left:8px solid #ef4444;
}

.reservada{
    border-left:8px solid #f59e0b;
}

.limpieza{
    border-left:8px solid #3b82f6;
}

.numero{
    font-size:20px;
    font-weight:bold;
    color:#0d4d85;
}

.estado{
    margin-top:8px;
    font-weight:bold;
}

.dato{
    margin-top:5px;
    color:#444;
    font-size:14px;
}

</style>
</head>

<body>

<div class="login" id="login">

<h2>Hospital Regional de Talca</h2>

<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">

<select>
<option>Médico</option>
<option>Enfermero</option>
<option>Administrador</option>
</select>

<button onclick="login()">Ingresar</button>

<p id="error" style="color:red;"></p>

<div class="info">
<b>Usuarios:</b><br><br>

admin / 1234<br>
doctor / 1234<br>
enfermera / 1234
</div>

</div>

<div class="app" id="app">

<div class="top">
<h2>Gestión de Camas</h2>

<button onclick="logout()" style="background:white;color:#0d4d85;">
Cerrar sesión
</button>
</div>

<div class="container">

<div class="filters">
<button onclick="setFilter('all')">Todas</button>
<button onclick="setFilter('libre')">Libres</button>
<button onclick="setFilter('ocupada')">Ocupadas</button>
<button onclick="setFilter('reservada')">Reservadas</button>
<button onclick="setFilter('limpieza')">Limpieza</button>
</div>

<div class="grid" id="beds"></div>

</div>
</div>

<script>

const users = {
    admin:"1234",
    doctor:"1234",
    enfermera:"1234"
};

const pacientes = [
"Camila Rojas",
"Diego Muñoz",
"Fernanda Silva",
"Luis Torres",
"Javiera Soto",
"Matías Pérez",
"Valentina Díaz",
"Sebastián Herrera",
"Martina Fuentes",
"Benjamín Castro",
"Antonia Vega",
"Tomás Morales"
];

const areas = [
"Obstetricia",
"Medicina",
"Pediatría",
"Traumatología",
"Cirugía",
"UTI",
"Neurología"
];

const estados = [
"libre",
"ocupada",
"reservada",
"limpieza"
];

let filter = "all";

const beds = [];

for(let i=1;i<=30;i++){

    let estado = estados[Math.floor(Math.random()*estados.length)];

    beds.push({
        numero:"CAMA-"+i,
        estado:estado,
        paciente:pacientes[Math.floor(Math.random()*pacientes.length)],
        area:areas[Math.floor(Math.random()*areas.length)]
    });
}

function login(){

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(users[u] && users[u] === p){

        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";

        renderBeds();

    }else{
        document.getElementById("error").innerText = "Datos incorrectos";
    }
}

function logout(){
    location.reload();
}

function setFilter(f){
    filter = f;
    renderBeds();
}

function renderBeds(){

    let cont = document.getElementById("beds");

    cont.innerHTML = "";

    beds
    .filter(b => filter === "all" ? true : b.estado === filter)
    .forEach(b => {

        let div = document.createElement("div");

        div.className = "card " + b.estado;

        div.innerHTML = `
        
        <div class="numero">${b.numero}</div>

        <div class="estado">
        Estado: ${b.estado.toUpperCase()}
        </div>

        <div class="dato">
        Área: ${b.area}
        </div>

        <div class="dato">
        Paciente: ${b.estado === "ocupada" ? b.paciente : "Sin paciente"}
        </div>

        `;

        div.onclick = () => {

            if(b.estado === "libre"){
                b.estado = "ocupada";
            }else if(b.estado === "ocupada"){
                b.estado = "limpieza";
            }else{
                b.estado = "libre";
            }

            renderBeds();
        };

        cont.appendChild(div);

    });

}

</script>

</body>
</html>
